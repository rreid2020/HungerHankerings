# Production: use with managed Postgres. Put DB_*, REDIS_*, COOKIE_SECRET, APP_URL in .env (project root).
# Base compose sets DB_HOST=postgres; we must override with .env values (environment overrides env_file in Compose).
# Before any compose command on the droplet, run: set -a && [ -f .env ] && . ./.env && set +a
# Run: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.nginx.yml up -d

services:
  vendure:
    build:
      context: ./apps/vendure
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      COOKIE_SECRET: ${COOKIE_SECRET}
      APP_URL: ${APP_URL}
    command: ["node", "dist/index.js"]
    depends_on:
      - redis
    expose:
      - "3000"
    volumes:
      - vendure_assets:/app/assets

  vendure-worker:
    build:
      context: ./apps/vendure
      dockerfile: Dockerfile.worker
    env_file:
      - .env
    environment:
      NODE_ENV: production
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      COOKIE_SECRET: ${COOKIE_SECRET}
      APP_URL: ${APP_URL}
    command: ["node", "dist/worker.js"]
    depends_on:
      - vendure
      - redis

  storefront:
    env_file:
      - .env
    build:
      context: ./storefront
      args:
        NEXT_PUBLIC_VENDURE_SHOP_API_URL: ${NEXT_PUBLIC_VENDURE_SHOP_API_URL}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    command: ["npx", "next", "start", "-p", "3000", "-H", "0.0.0.0"]
    environment:
      HOSTNAME: 0.0.0.0
      VENDURE_SHOP_API_URL: http://vendure:3000/shop-api
    depends_on:
      - vendure
    expose:
      - "3000"

volumes:
  vendure_assets:
