# Production: use with managed Postgres. Put DB_*, REDIS_*, COOKIE_SECRET, APP_URL in .env (project root).
# Vendure services get env ONLY from env_file so they always use .env; no shell substitution needed.
# Run: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.nginx.yml up -d

services:
  vendure:
    build:
      context: ./apps/vendure
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
    command: ["node", "dist/index.js"]
    depends_on:
      - redis
    expose:
      - "3000"
    volumes:
      - vendure_assets:/app/assets

  vendure-worker:
    build:
      context: ./apps/vendure
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      NODE_ENV: production
    command: ["node", "dist/worker.js"]
    depends_on:
      - vendure
      - redis

  storefront:
    env_file:
      - .env
    build:
      context: ./storefront
      args:
        NEXT_PUBLIC_VENDURE_SHOP_API_URL: ${NEXT_PUBLIC_VENDURE_SHOP_API_URL}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    command: ["npx", "next", "start", "-p", "3000", "-H", "0.0.0.0"]
    environment:
      HOSTNAME: 0.0.0.0
      VENDURE_SHOP_API_URL: http://vendure:3000/shop-api
    depends_on:
      - vendure
    expose:
      - "3000"

volumes:
  vendure_assets:
