# Deploy to DigitalOcean Droplet on push to main.
#
# Secrets: DROPLET_IP, DROPLET_SSH_KEY (private OpenSSH key for root@droplet).
# Uses the runner's native `ssh` (same as your PC) — no Docker / appleboy key_path quirks.
# Remote commands live in deploy/droplet-deploy-remote.sh (edit there, not only here).
#
# Run DB migrations from your machine before deploying (see apps/vendure/README.md).
# This workflow only builds and starts the stack; the DB must already be migrated.
name: Deploy to Droplet

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 150
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to Droplet (native SSH)
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DROPLET_SSH_KEY }}
          DROPLET_IP: ${{ secrets.DROPLET_IP }}
          KEY_PASSPHRASE: ${{ secrets.DROPLET_SSH_KEY_PASSPHRASE }}
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/ci_deploy_key
          chmod 600 ~/.ssh/ci_deploy_key
          if [ -z "$KEY_PASSPHRASE" ]; then
            ssh-keygen -y -f ~/.ssh/ci_deploy_key >/dev/null
            echo "SSH private key parses OK (no passphrase)."
          else
            echo "Passphrase secret set; skipping ssh-keygen verify (use a passphraseless key for CI if deploy fails)."
          fi
          ssh-keyscan -T 10 -H "$DROPLET_IP" >> ~/.ssh/known_hosts 2>/dev/null || true
          ssh -i ~/.ssh/ci_deploy_key -o IdentitiesOnly=yes \
            -o StrictHostKeyChecking=accept-new \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=400 \
            "root@${DROPLET_IP}" bash -s < "${GITHUB_WORKSPACE}/deploy/droplet-deploy-remote.sh"
