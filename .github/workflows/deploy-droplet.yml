# Deploy to DigitalOcean Droplet on push to main.
# Requires GitHub secrets: DROPLET_IP, DROPLET_SSH_KEY (private key contents).
# If the key is passphrase-protected, add DROPLET_SSH_KEY_PASSPHRASE.
name: Deploy to Droplet

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ secrets.DROPLET_SSH_KEY }}
          passphrase: ${{ secrets.DROPLET_SSH_KEY_PASSPHRASE }}
          command_timeout: 30m
          script: |
            set -e
            cd /root/HungerHankerings
            git fetch origin main
            git reset --hard origin/main
            export COMPOSE_PROJECT_NAME=hungerhankerings
            docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.nginx.yml build --no-cache
            echo "Starting stack (Vendure runs migrations on startup, same DB as server)..."
            docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.nginx.yml up -d --force-recreate --remove-orphans
            echo "Waiting for Vendure to listen (up to 90s)..."
            ok=0
            for i in $(seq 1 18); do
              if docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.nginx.yml exec -T nginx wget -qO- --timeout=5 http://vendure:3000/shop-api 2>/dev/null | head -c 1 | grep -q .; then
                ok=1
                break
              fi
              echo "Attempt $i/18: Vendure not ready, waiting 5s..."
              sleep 5
            done
            if [ "$ok" = "1" ]; then
              echo "Vendure reachable from nginx."
            else
              echo "Vendure did not become reachable. Dumping vendure logs:"
              docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.nginx.yml logs vendure --tail=100 || true
              echo "--- nginx can resolve vendure?"
              docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.nginx.yml exec -T nginx wget -qO- --timeout=3 http://vendure:3000/shop-api 2>&1 || true
              exit 1
            fi
