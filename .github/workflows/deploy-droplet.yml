# Deploy to DigitalOcean Droplet on push to main.
#
# Secrets: DROPLET_IP, DROPLET_SSH_KEY (private key for SSH to droplet). If your key has a passphrase, add DROPLET_SSH_KEY_PASSPHRASE and passphrase: ${{ secrets.DROPLET_SSH_KEY_PASSPHRASE }} to the with: block.
#
# Run DB migrations from your machine before deploying (see apps/vendure/README.md).
# This workflow only builds and starts the stack; the DB must already be migrated.
name: Deploy to Droplet

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SSH_KEY: ${{ secrets.DROPLET_SSH_KEY }}
    steps:
      - name: Deploy to Droplet
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DROPLET_IP }}
          username: root
          key: ${{ env.SSH_KEY }}
          command_timeout: 30m
          script: |
            set -e
            cd /root/HungerHankerings
            git fetch origin main
            git reset --hard origin/main
            export COMPOSE_PROJECT_NAME=hungerhankerings
            if [ ! -f .env ]; then
              echo "ERROR: .env not found at /root/HungerHankerings/.env. Create it from deploy/env.production.example."
              exit 1
            fi
            # Source .env into shell AND use --env-file so Compose always has DB_* for substitution (run and up must see same values)
            set -a && . ./.env && set +a
            echo "DB target (from .env): DB_HOST=$DB_HOST DB_NAME=$DB_NAME"
            echo "Freeing disk space before build (prune images, containers, build cache)..."
            docker system prune -af 2>/dev/null || true
            docker builder prune -af 2>/dev/null || true
            docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.nginx.yml build --no-cache
            # Ensure Vendure schema exists on the DB we use (same .env). With no migration files, runMigrations does nothing;
            # the "creating a new table" logs are TypeORM's diff only—tables are not created when synchronize is false.
            # So: if administrator table is missing, run one-time schema creation (synchronize) against that DB.
            echo "Checking if Vendure schema exists on $DB_NAME..."
            set +e
            docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.nginx.yml run --rm vendure node dist/check-schema.js
            schema_ok=$?
            set -e
            if [ "$schema_ok" -ne 0 ]; then
              echo "Schema missing; running one-time schema creation (RUN_SCHEMA_SYNC=1)..."
              docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.nginx.yml run --rm -e RUN_SCHEMA_SYNC=1 vendure node dist/schema-init.js
            else
              echo "Vendure schema already exists."
            fi
            echo "Running migrations (one-off container, same .env as stack)..."
            docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.nginx.yml run --rm vendure node dist/migrate.js
            echo "Ensuring postal_code_zone table exists (idempotent)..."
            docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.nginx.yml run --rm vendure node dist/create-postal-code-zone-table.js
            echo "Seeding postal code zones if empty (idempotent)..."
            docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.nginx.yml run --rm vendure node dist/seed-postal-code-zones.js
            echo "Starting stack..."
            docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.nginx.yml up -d --force-recreate --remove-orphans
            echo "Verify vendure container DB env (must match .env):"
            docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.nginx.yml exec -T vendure env | grep -E '^DB_HOST=|^DB_NAME=|^DB_PORT=' || true
            echo "Waiting for Vendure to listen (up to 90s)..."
            ok=0
            for i in $(seq 1 18); do
              if docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.nginx.yml exec -T nginx wget -qO- --timeout=5 http://vendure:3000/health 2>/dev/null | head -c 1 | grep -q .; then
                ok=1
                break
              fi
              echo "Attempt $i/18: Vendure not ready, waiting 5s..."
              sleep 5
            done
            if [ "$ok" = "1" ]; then
              echo "Vendure reachable from nginx."
            else
              echo "Vendure did not become reachable. Dumping vendure logs:"
              docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.nginx.yml logs vendure --tail=100 || true
              echo "--- nginx can resolve vendure?"
              docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.nginx.yml exec -T nginx wget -qO- --timeout=3 http://vendure:3000/health 2>&1 || true
              exit 1
            fi

            echo "--- Health checks ---"
            comp="docker compose --env-file .env -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.nginx.yml"
            psout=$($comp ps -a 2>/dev/null) || { echo "FAIL: docker compose ps failed"; exit 1; }
            # All required containers must be running (status contains "Up" and not "Restarting")
            for svc in vendure vendure-worker storefront nginx redis; do
              line=$(echo "$psout" | grep -E "\s+$svc\s+" | head -1)
              if [ -z "$line" ]; then
                echo "FAIL: No container for service $svc."
                echo "$psout"
                exit 1
              fi
              if echo "$line" | grep -q "Restarting"; then
                echo "FAIL: $svc is in restart loop."
                $comp logs "$svc" --tail=30
                exit 1
              fi
              if ! echo "$line" | grep -q "Up"; then
                echo "FAIL: $svc is not up (status: $line)."
                echo "$psout"
                exit 1
              fi
              echo "  $svc: running"
            done
            # Public endpoints via nginx (localhost:80 on droplet)
            health_code=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 http://127.0.0.1/health 2>/dev/null || echo "000")
            if [ "$health_code" != "200" ]; then
              echo "FAIL: GET /health returned $health_code (expected 200)."
              exit 1
            fi
            echo "  GET /health: 200"
            storefront_code=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 http://127.0.0.1/ 2>/dev/null || echo "000")
            if [ "$storefront_code" != "200" ]; then
              echo "FAIL: GET / (storefront) returned $storefront_code (expected 200)."
              exit 1
            fi
            echo "  GET / (storefront): 200"
            echo "Health checks passed."
