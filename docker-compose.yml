services:
  postgres:
    image: postgres:15
    profiles:
      - local
    environment:
      POSTGRES_USER: saleor
      POSTGRES_PASSWORD: saleor
      POSTGRES_DB: saleor
    volumes:
      - saleor_postgres:/var/lib/postgresql/data
    ports:
      - "55432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  saleor-api:
    image: ghcr.io/saleor/saleor:3.20
    depends_on:
      - redis
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgres://saleor:saleor@postgres:5432/saleor
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,saleor-api"
      DEBUG: "1"
      ENABLE_DEBUG_TOOLBAR: "0"
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DEFAULT_FROM_EMAIL: hello@hungerhankerings.com
      EMAIL_URL: smtp://mailpit:1025
    volumes:
      - saleor_media:/app/media

  saleor-worker:
    image: ghcr.io/saleor/saleor:3.20
    command: celery -A saleor worker --loglevel=info
    depends_on:
      - saleor-api
      - redis
    environment:
      DATABASE_URL: postgres://saleor:saleor@postgres:5432/saleor
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key
      ALLOWED_HOSTS: "localhost,127.0.0.1,0.0.0.0,saleor-api"
      DEBUG: "1"
      ENABLE_DEBUG_TOOLBAR: "0"
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      DEFAULT_FROM_EMAIL: hello@hungerhankerings.com
      EMAIL_URL: smtp://mailpit:1025
    volumes:
      - saleor_media:/app/media

  saleor-dashboard:
    image: ghcr.io/saleor/saleor-dashboard:3.20
    ports:
      - "9000:80"
    environment:
      API_URL: http://localhost:8000/graphql/

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"

  storefront:
    build:
      context: ./storefront
      args:
        # So client-side code works from any device (not just localhost).
        NEXT_PUBLIC_SALEOR_API_URL: ${NEXT_PUBLIC_SALEOR_API_URL:-http://localhost:8000/graphql/}
    env_file:
      - ./storefront/.env
    environment:
      SALEOR_API_URL: http://saleor-api:8000/graphql/
      # Listen on all interfaces so the app is reachable from other PCs.
      HOSTNAME: 0.0.0.0
    depends_on:
      - saleor-api
    ports:
      - "3000:3000"

volumes:
  saleor_postgres:
  saleor_media:
