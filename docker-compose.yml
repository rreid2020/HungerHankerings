# Base: redis, vendure, vendure-worker, storefront, mailpit. Postgres optional with --profile local. Prod overrides in docker-compose.prod.yml.
services:
  postgres:
    image: postgres:15
    profiles:
      - local
    environment:
      POSTGRES_USER: vendure
      POSTGRES_PASSWORD: vendure
      POSTGRES_DB: vendure
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "55432:5432"

  redis:
    restart: unless-stopped
    image: redis:7
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"
      # SMTP for host-side apps; in Docker use hostname `mailpit` and port 1025
      - "1025:1025"

  vendure:
    build:
      context: ./apps/vendure
      dockerfile: Dockerfile
    # Use vars from .env when set (e.g. --env-file .env on droplet); else dev defaults so base never "wins" over prod
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-vendure}
      DB_PASSWORD: ${DB_PASSWORD:-vendure}
      DB_NAME: ${DB_NAME:-vendure}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      COOKIE_SECRET: ${COOKIE_SECRET:-dev-cookie-secret}
      APP_URL: ${APP_URL:-http://localhost:3000}
      NODE_ENV: ${NODE_ENV:-development}
    command: ["node", "dist/index.js"]
    depends_on:
      redis: { condition: service_started }
    ports:
      - "3000:3000"
    volumes:
      - vendure_assets:/app/assets

  vendure-worker:
    build:
      context: ./apps/vendure
      dockerfile: Dockerfile
    environment:
      DB_HOST: ${DB_HOST:-postgres}
      DB_PORT: ${DB_PORT:-5432}
      DB_USER: ${DB_USER:-vendure}
      DB_PASSWORD: ${DB_PASSWORD:-vendure}
      DB_NAME: ${DB_NAME:-vendure}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      COOKIE_SECRET: ${COOKIE_SECRET:-dev-cookie-secret}
      NODE_ENV: ${NODE_ENV:-development}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_FROM: ${SMTP_FROM:-Hunger Hankerings <noreply@hungerhankerings.local>}
      ORDERS_INBOX_EMAIL: ${ORDERS_INBOX_EMAIL:-orders@hungerhankerings.com}
    command: ["node", "dist/worker.js"]
    depends_on:
      - vendure
      - redis
      - mailpit

  storefront:
    build:
      context: ./storefront
      args:
        NEXT_PUBLIC_VENDURE_SHOP_API_URL: ${NEXT_PUBLIC_VENDURE_SHOP_API_URL:-http://localhost:3000/shop-api}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    environment:
      VENDURE_SHOP_API_URL: http://vendure:3000/shop-api
      VENDURE_SERVER_FETCH_TIMEOUT_MS: ${VENDURE_SERVER_FETCH_TIMEOUT_MS:-30000}
    depends_on: []
    ports:
      - "3001:3000"

  nginx:
    image: nginx:alpine

networks:
  default:
    name: hungerhankerings_default

volumes:
  postgres_data:
  vendure_assets:
