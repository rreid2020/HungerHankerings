# Base: redis, vendure, vendure-worker, storefront, mailpit. Postgres optional with --profile local. Prod overrides in docker-compose.prod.yml.
services:
  postgres:
    image: postgres:15
    profiles:
      - local
    environment:
      POSTGRES_USER: vendure
      POSTGRES_PASSWORD: vendure
      POSTGRES_DB: vendure
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "55432:5432"

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "8025:8025"

  vendure:
    build:
      context: ./apps/vendure
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: vendure
      DB_PASSWORD: vendure
      DB_NAME: vendure
      REDIS_HOST: redis
      REDIS_PORT: 6379
      COOKIE_SECRET: dev-cookie-secret
      APP_URL: http://localhost:3000
      NODE_ENV: development
    command: ["node", "dist/index.js"]
    depends_on:
      redis: { condition: service_started }
    ports:
      - "3000:3000"
    volumes:
      - vendure_assets:/app/assets

  vendure-worker:
    build:
      context: ./apps/vendure
      dockerfile: Dockerfile
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: vendure
      DB_PASSWORD: vendure
      DB_NAME: vendure
      REDIS_HOST: redis
      REDIS_PORT: 6379
      COOKIE_SECRET: dev-cookie-secret
      NODE_ENV: development
    command: ["node", "dist/worker.js"]
    depends_on:
      - vendure
      - redis

  storefront:
    build:
      context: ./storefront
      args:
        NEXT_PUBLIC_VENDURE_SHOP_API_URL: ${NEXT_PUBLIC_VENDURE_SHOP_API_URL:-http://localhost:3000/shop-api}
        NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: ${NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY:-}
    environment:
      VENDURE_SHOP_API_URL: http://vendure:3000/shop-api
      HOSTNAME: 0.0.0.0
    depends_on: []
    ports:
      - "3001:3000"

  nginx:
    image: nginx:alpine

volumes:
  postgres_data:
  vendure_assets:
