server {
  listen 80;
  server_name hungerhankerings.com;

  # Checkout completion POST: many sequential Vendure + Stripe steps (storefront /api/checkout/complete).
  location ^~ /api/checkout {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  # Explicit timeouts: nginx defaults are 60s read/send — not 30s. If the browser still fails at ~30s,
  # the limit is usually an outer load balancer or CDN idle timeout, not this file.
  location ^~ /checkout {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_read_timeout 180s;
    proxy_send_timeout 180s;
  }

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_connect_timeout 60s;
    proxy_read_timeout 180s;
    proxy_send_timeout 180s;
  }
}

server {
  listen 80;
  server_name api.hungerhankerings.com;

