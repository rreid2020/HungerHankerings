# Paste into DigitalOcean → App → Settings → App spec → Edit (omit # comments if the editor rejects them).
# Replace BUILD_TIME URLs with your real App URL before relying on the storefront bundle.
#
# Add RUN_TIME env vars in the UI for mail (not shown below): SMTP_HOST, SMTP_PORT, SMTP_USER,
# SMTP_PASS, SMTP_SECURE, SMTP_FROM, ORDERS_INBOX_EMAIL — required for order + inbox emails on worker.
# Consider apps-s-1vcpu-2gb+ if you see 504/timeouts (API + worker + Next share one container).

alerts:
  - rule: DEPLOYMENT_FAILED
  - rule: DOMAIN_FAILED

databases:
  - cluster_name: db-postgresql-tor1-60715
    db_name: vendure
    db_user: doadmin
    engine: PG
    name: db-postgresql-tor1-60715
    production: true

ingress:
  rules:
    - component:
        name: hungerhankerings
      match:
        path:
          prefix: /

name: hunger-hankerings
region: tor

services:
  - name: hungerhankerings
    github:
      repo: rreid2020/HungerHankerings
      branch: main
      deploy_on_push: true
    dockerfile_path: Dockerfile
    http_port: 8080
    instance_count: 1
    # 1 GB often 504s under Admin job-queue polling + worker + Next; use 2 GB+ in production.
    instance_size_slug: apps-s-1vcpu-2gb
    health_check:
      http_path: /health
      initial_delay_seconds: 120
      period_seconds: 15
      timeout_seconds: 25
      success_threshold: 1
      failure_threshold: 5
    envs:
      - key: NEXT_PUBLIC_VENDURE_SHOP_API_URL
        scope: BUILD_TIME
        value: "https://hunger-hankerings-enxau.ondigitalocean.app/shop-api"
      - key: NEXT_PUBLIC_SITE_URL
        scope: BUILD_TIME
        value: "https://hunger-hankerings-enxau.ondigitalocean.app"
      - key: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        scope: BUILD_TIME
        value: "pk_test_REPLACE_IN_UI_WITH_YOUR_KEY"
      - key: DB_HOST
        scope: RUN_TIME
        value: "${db-postgresql-tor1-60715.HOSTNAME}"
      - key: DB_PORT
        scope: RUN_TIME
        value: "${db-postgresql-tor1-60715.PORT}"
      - key: DB_USER
        scope: RUN_TIME
        value: "${db-postgresql-tor1-60715.USERNAME}"
      - key: DB_PASSWORD
        scope: RUN_TIME
        value: "${db-postgresql-tor1-60715.PASSWORD}"
      - key: DB_NAME
        scope: RUN_TIME
        value: "${db-postgresql-tor1-60715.DATABASE}"
      - key: DB_SSL_REJECT_UNAUTHORIZED
        scope: RUN_TIME
        value: "false"
      - key: VENDURE_SHOP_API_URL
        scope: RUN_TIME
        value: "http://127.0.0.1:3000/shop-api"
      - key: APP_URL
        scope: RUN_TIME
        value: "https://hunger-hankerings-enxau.ondigitalocean.app"
      - key: NODE_ENV
        scope: RUN_TIME
        value: "production"
      # --- Directus (optional): add domains ops.<your-domain> on this App, then set e.g. ---
      # ENABLE_DIRECTUS: RUN_TIME "true"
      # INTERNAL_OPS_HOST: RUN_TIME "ops.hungerhankerings.com"
      # PUBLIC_URL: RUN_TIME "https://ops.hungerhankerings.com"
      # KEY / SECRET: RUN_TIME secrets (stable across deploys)
      # ADMIN_EMAIL / ADMIN_PASSWORD: RUN_TIME (first boot)
      # DB_CLIENT: RUN_TIME "pg"
      # DB_DATABASE: RUN_TIME "hungerhankeringsadmin"
      # Directus DO Postgres TLS (avoid "__" keys on App Platform): DB_SSL: RUN_TIME 'json:{"rejectUnauthorized":false}'
      # (Reuse DB_HOST, DB_PORT, DB_USER, DB_PASSWORD with Vendure; keep DB_NAME=vendure for Vendure.)
