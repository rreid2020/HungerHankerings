worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Higher API ceiling: hydration sends several Shop GraphQL POSTs quickly; a low rate risks stalls under load.
    limit_req_zone $binary_remote_addr zone=api:10m rate=80r/s;
    limit_req_zone $binary_remote_addr zone=web:10m rate=120r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    # Load balancers (e.g. App Platform) terminate TLS; the hop to this nginx is often HTTP.
    # Forward the client's scheme so Next.js / Clerk see https and set cookies and redirects correctly.
    map $http_x_forwarded_proto $pass_forwarded_proto {
        default $http_x_forwarded_proto;
        "" $scheme;
    }

    include /etc/nginx/http.d/*.conf;
}
