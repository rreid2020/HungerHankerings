worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Higher API ceiling: hydration sends several Shop GraphQL POSTs quickly; a low rate risks stalls under load.
    limit_req_zone $binary_remote_addr zone=api:10m rate=80r/s;
    limit_req_zone $binary_remote_addr zone=web:10m rate=120r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    include /etc/nginx/http.d/*.conf;
}
