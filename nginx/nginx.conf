# Rate limiting and reverse proxy for Hunger Hankerings (Vendure + storefront).
# Use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.nginx.yml up -d
# Resolver: use Docker's embedded DNS so upstream hostnames (vendure, storefront) are resolved at request time.

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=web:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    upstream storefront {
        server storefront:3000;
    }
    upstream vendure {
        server vendure:3000;
    }

    server {
        listen 80;
        server_name _;

        limit_conn conn 20;

        # Security headers (add after SSL if you use HTTPS in front of Nginx)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Vendure Admin UI: login-image.vendure.io (connect-src)
        # Stripe.js + Payment Element; Apple Pay SDK (applepay.cdn-apple.com); Google Pay (pay.google.com)
        # connect-src: Stripe APIs + Apple Pay gateways + Google Pay
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://js.stripe.com https://applepay.cdn-apple.com https://pay.google.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://login-image.vendure.io https://api.stripe.com https://merchant-ui-api.stripe.com https://errors.stripe.com https://r.stripe.com https://ppm.stripe.com https://qr.stripe.com https://m.stripe.network https://apple-pay-gateway.apple.com https://apple-pay-gateway-cert.apple.com https://www.googleapis.com https://pay.google.com; frame-src 'self' https://js.stripe.com https://hooks.stripe.com https://pay.google.com; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

        # Block HTML in asset path to prevent phishing (uploaded HTML served as page)
        location ~* ^/assets/.*\.(html?|htm)$ {
            return 404;
        }

        # Vendure Shop API (GraphQL). Checkout/cart queries can exceed 60s under DB load or slow plugins.
        location /shop-api {
            limit_req zone=api burst=20 nodelay;
            set $vendure_upstream vendure:3000;
            proxy_pass http://$vendure_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 180s;
        }

        # Vendure Admin API (GraphQL)
        location /admin-api {
            limit_req zone=api burst=20 nodelay;
            set $vendure_upstream vendure:3000;
            proxy_pass http://$vendure_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Stripe (and other payment) webhooks
        location /payments/ {
            set $vendure_upstream vendure:3000;
            proxy_pass http://$vendure_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Email dev mailbox is only mounted when EmailPlugin devMode:true. Block on this prod stack anyway.
        location = /mailbox {
            return 404;
        }
        location ^~ /mailbox/ {
            return 404;
        }

        # Vendure health (Admin UI / main-nav may request this from the public origin)
        location /health {
            set $vendure_upstream vendure:3000;
            proxy_pass http://$vendure_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Shipping rates admin page (Vendure plugin)
        location /shipping-rates {
            limit_req zone=web burst=20 nodelay;
            set $vendure_upstream vendure:3000;
            proxy_pass http://$vendure_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # Vendure Admin UI and assets
        location /admin {
            limit_req zone=web burst=30 nodelay;
            set $vendure_upstream vendure:3000;
            proxy_pass http://$vendure_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }
        location /assets/ {
            limit_req zone=web burst=30 nodelay;
            set $vendure_upstream vendure:3000;
            proxy_pass http://$vendure_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # Checkout API: many sequential Shop API round-trips + Stripe; must outlive nginx default /api/ slack.
        location ^~ /api/checkout {
            limit_req zone=api burst=40 nodelay;
            set $storefront_upstream storefront:3000;
            proxy_pass http://$storefront_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 300s;
        }

        # Next.js API routes (login, checkout, etc.) — own rate limit so asset load on / doesn't starve POSTs
        location ^~ /api/ {
            limit_req zone=api burst=40 nodelay;
            set $storefront_upstream storefront:3000;
            proxy_pass http://$storefront_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 180s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 180s;
        }

        # Checkout: RSC + heavy client tree; explicit block so it never inherits a shorter timeout from
        # another layer in your mental model. If you still see ~30s 504s here, nginx is not the limit —
        # raise idle timeout on an outer load balancer (e.g. DigitalOcean LB often defaults to 60s; some CDNs use 30s).
        location ^~ /checkout {
            limit_req zone=web burst=50 nodelay;
            set $storefront_upstream storefront:3000;
            proxy_pass http://$storefront_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 60s;
            proxy_read_timeout 180s;
            proxy_send_timeout 180s;
        }

        # Storefront and everything else (HTML + RSC). Match /api/ slack so cold/slow SSR
        # is less likely to 504 before the app responds; fix slow pages in-app, don’t rely on this.
        location / {
            limit_req zone=web burst=50 nodelay;
            set $storefront_upstream storefront:3000;
            proxy_pass http://$storefront_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 120s;
        }
    }
}
