# Rate limiting and reverse proxy for Hunger Hankerings (Vendure + storefront).
# Use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.nginx.yml up -d

events {
    worker_connections 1024;
}

http {
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=web:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    upstream storefront {
        server storefront:3000;
    }
    upstream vendure {
        server vendure:3000;
    }

    server {
        listen 80;
        server_name _;

        limit_conn conn 20;

        # Vendure Shop API (GraphQL)
        location /shop-api {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://vendure;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Vendure Admin API (GraphQL)
        location /admin-api {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://vendure;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Vendure Admin UI and assets
        location /admin {
            limit_req zone=web burst=30 nodelay;
            proxy_pass http://vendure;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
        location /assets/ {
            limit_req zone=web burst=30 nodelay;
            proxy_pass http://vendure;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Storefront and everything else
        location / {
            limit_req zone=web burst=50 nodelay;
            proxy_pass http://storefront;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
