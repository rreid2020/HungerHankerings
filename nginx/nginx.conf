# Rate limiting and reverse proxy for Hunger Hankerings.
# Use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.nginx.yml up -d

events {
    worker_connections 1024;
}

http {
    # Rate limit zones (per client IP)
    # api: 10 req/s, burst 20 (GraphQL)
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    # web: 30 req/s, burst 50 (storefront + static)
    limit_req_zone $binary_remote_addr zone=web:10m rate=30r/s;

    # Optional: limit connections per IP (e.g. 20 concurrent per IP)
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    upstream storefront {
        server storefront:3000;
    }
    upstream saleor_api {
        server saleor-api:8000;
    }
    upstream saleor_dashboard {
        server saleor-dashboard:80;
    }

    server {
        listen 80;
        server_name _;

        # Global connection limit per IP (optional)
        limit_conn conn 20;

        # Saleor GraphQL API – stricter limit (expensive operations)
        location /graphql/ {
            limit_req zone=api burst=20 nodelay;
            proxy_pass http://saleor_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Saleor dashboard (admin)
        location /dashboard/ {
            limit_req zone=web burst=30 nodelay;
            proxy_pass http://saleor_dashboard/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Storefront and everything else
        location / {
            limit_req zone=web burst=50 nodelay;
            proxy_pass http://storefront;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
