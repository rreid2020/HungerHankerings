# Rate limiting and reverse proxy for Hunger Hankerings (Vendure + storefront).
# Use with: docker compose -f docker-compose.yml -f docker-compose.prod.yml -f docker-compose.nginx.yml up -d
# Resolver: use Docker's embedded DNS so upstream hostnames (vendure, storefront) are resolved at request time.

events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=10s ipv6=off;
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=web:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=conn:10m;

    upstream storefront {
        server storefront:3000;
    }
    upstream vendure {
        server vendure:3000;
    }

    server {
        listen 80;
        server_name _;

        limit_conn conn 20;

        # Security headers (add after SSL if you use HTTPS in front of Nginx)
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        # Vendure Admin UI loads login background from login-image.vendure.io; allow it in connect-src
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' https://login-image.vendure.io; frame-ancestors 'self'; base-uri 'self'; form-action 'self';" always;

        # Block HTML in asset path to prevent phishing (uploaded HTML served as page)
        location ~* ^/assets/.*\.(html?|htm)$ {
            return 404;
        }

        # Vendure Shop API (GraphQL)
        location /shop-api {
            limit_req zone=api burst=20 nodelay;
            set $vendure_upstream vendure:3000;
            proxy_pass http://$vendure_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 60s;
            proxy_send_timeout 60s;
        }

        # Vendure Admin API (GraphQL)
        location /admin-api {
            limit_req zone=api burst=20 nodelay;
            set $vendure_upstream vendure:3000;
            proxy_pass http://$vendure_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }

        # Vendure Admin UI and assets
        location /admin {
            limit_req zone=web burst=30 nodelay;
            set $vendure_upstream vendure:3000;
            proxy_pass http://$vendure_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }
        location /assets/ {
            limit_req zone=web burst=30 nodelay;
            set $vendure_upstream vendure:3000;
            proxy_pass http://$vendure_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 10s;
            proxy_read_timeout 60s;
        }

        # Storefront and everything else
        location / {
            limit_req zone=web burst=50 nodelay;
            set $storefront_upstream storefront:3000;
            proxy_pass http://$storefront_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
        }
    }
}
