<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 520" fill="none" aria-hidden="true">
  <!-- Soft background shapes -->
  <circle cx="120" cy="100" r="36" fill="#F7E1D7" opacity="0.85"/>
  <circle cx="680" cy="380" r="48" fill="#D4E3D5" opacity="0.6"/>
  <path d="M640 90 L660 120 L630 120 Z" fill="#EDAFB8" opacity="0.5"/>
  <path d="M90 400 L110 430 L70 430 Z" fill="#B0C4B1" opacity="0.45"/>

  <!-- Dashed routes (delivery / many destinations) -->
  <path d="M140 280 Q260 200 380 260 T620 240" stroke="#4A5759" stroke-width="2.5" stroke-dasharray="10 14" stroke-linecap="round" opacity="0.35"/>

  <!-- Back box -->
  <rect x="300" y="160" width="200" height="160" rx="10" fill="#FAE4E8" stroke="#4A5759" stroke-width="3"/>
  <rect x="300" y="210" width="200" height="12" fill="#EDAFB8" stroke="#4A5759" stroke-width="2.5"/>
  <path d="M400 160 V280" stroke="#4A5759" stroke-width="2.5"/>
  <path d="M400 200 L400 230" stroke="#4A5759" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Left box -->
  <rect x="140" y="220" width="150" height="140" rx="9" fill="#F7E1D7" stroke="#4A5759" stroke-width="3"/>
  <rect x="140" y="268" width="150" height="11" fill="#D4E3D5" stroke="#4A5759" stroke-width="2.5"/>
  <path d="M215 220 V360" stroke="#4A5759" stroke-width="2.5"/>
  <ellipse cx="215" cy="248" rx="22" ry="12" fill="#EDAFB8" stroke="#4A5759" stroke-width="2.5"/>

  <!-- Right box -->
  <rect x="510" y="200" width="160" height="150" rx="9" fill="#E8F0E9" stroke="#4A5759" stroke-width="3"/>
  <rect x="510" y="252" width="160" height="11" fill="#F7E1D7" stroke="#4A5759" stroke-width="2.5"/>
  <path d="M590 200 V350" stroke="#4A5759" stroke-width="2.5"/>
  <rect x="575" y="188" width="30" height="22" rx="4" fill="#EDAFB8" stroke="#4A5759" stroke-width="2.5"/>

  <!-- Abstract many recipients dots (no figures) -->
  <circle cx="180" cy="120" r="8" fill="#4A5759" opacity="0.2"/>
  <circle cx="420" cy="95" r="8" fill="#4A5759" opacity="0.2"/>
  <circle cx="620" cy="140" r="8" fill="#4A5759" opacity="0.2"/>
  <circle cx="720" cy="300" r="8" fill="#4A5759" opacity="0.2"/>
</svg>
